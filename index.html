<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MyTube</title>

<style>
body{font-family:Arial;background:#f2f2f2;text-align:center}
input{padding:10px;width:300px}
button{padding:10px;background:red;color:white;border:none}
#videos{display:grid;grid-template-columns:repeat(auto-fill,220px);gap:20px;justify-content:center;margin-top:30px}
.video img{width:220px;cursor:pointer}
iframe{width:560px;height:315px;margin-top:20px}
</style>

</head>
<body>

<h2>🎬 MyTube</h2>

<input id="videoLink" placeholder="Paste YouTube link">
<button onclick="addVideo()">Add</button>

<br><br>

<input id="search" placeholder="Search videos" onkeyup="searchVideos()">

<div id="player"></div>

<div id="videos"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyC6K2g9iMqZkQg8QJV1dU_dqpQXjmcqfPY",
authDomain:"mytube-pro-8574b.firebaseapp.com",
projectId:"mytube-pro-8574b",
storageBucket:"mytube-pro-8574b.firebasestorage.app",
messagingSenderId:"257345211479",
appId:"1:257345211479:web:de0b2e790a4d4dc4642712"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

function getID(url){
return url.split("v=")[1]?.split("&")[0] || url.split("/").pop();
}

window.addVideo=async function(){

let link=document.getElementById("videoLink").value;
if(!link) return;

await addDoc(collection(db,"videos"),{
url:link,
created:Date.now()
});

document.getElementById("videoLink").value="";
}

function play(url){

let id=getID(url);

document.getElementById("player").innerHTML=
`<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;
}

const videosDiv=document.getElementById("videos");

const q=query(collection(db,"videos"),orderBy("created","desc"));

onSnapshot(q,(snapshot)=>{

videosDiv.innerHTML="";

snapshot.forEach(doc=>{

let v=doc.data();
let id=getID(v.url);
let thumb=`https://img.youtube.com/vi/${id}/hqdefault.jpg`;

videosDiv.innerHTML+=`
<div class="video">
<img src="${thumb}" onclick="play('${v.url}')">
</div>
`;

});

});

window.searchVideos=function(){

let text=document.getElementById("search").value.toLowerCase();

document.querySelectorAll(".video").forEach(v=>{
v.style.display=v.innerText.toLowerCase().includes(text)?"block":"none";
});

}

</script>

</body>
</html>
