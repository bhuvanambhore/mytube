<!DOCTYPE html>
<html>

<head>

<title>MyTube</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f1f1f1;
}

header{
background:red;
color:white;
padding:15px;
font-size:24px;
}

.container{
padding:20px;
}

input{
padding:10px;
margin:5px;
}

button{
padding:10px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.video{
background:white;
padding:10px;
border-radius:6px;
}

.video img{
width:100%;
border-radius:5px;
}

.video p{
font-size:14px;
}

iframe{
margin-top:10px;
border-radius:5px;
}

</style>

</head>

<body>

<header>
MyTube
</header>

<div class="container">

<input id="videoLink" placeholder="Paste YouTube link">

<button onclick="addVideo()">Add Video</button>

<br><br>

<input id="search" placeholder="Search videos" onkeyup="searchVideo()">

<div class="grid" id="videoGrid"></div>

</div>

<script>

let videos = JSON.parse(localStorage.getItem("videos")) || []

function getID(url){

let reg = /(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/

let match = url.match(reg)

return match ? match[1] : null

}

function addVideo(){

let url = document.getElementById("videoLink").value

let id = getID(url)

if(!id){

alert("Invalid YouTube Link")

return

}

let thumb = "https://img.youtube.com/vi/"+id+"/0.jpg"

let video = {

id:id,

title:"YouTube Video",

thumb:thumb

}

videos.push(video)

localStorage.setItem("videos",JSON.stringify(videos))

document.getElementById("videoLink").value=""

showVideos()

}

function showVideos(){

let grid = document.getElementById("videoGrid")

grid.innerHTML=""

videos.forEach((v,index)=>{

grid.innerHTML+=`

<div class="video">

<img src="${v.thumb}">

<p>${v.title}</p>

<iframe 
width="100%" 
height="150"
src="https://www.youtube.com/embed/${v.id}"
frameborder="0"
allowfullscreen>
</iframe>

<br>

<button onclick="deleteVideo(${index})">
Delete
</button>

</div>

`

})

}

function deleteVideo(index){

videos.splice(index,1)

localStorage.setItem("videos",JSON.stringify(videos))

showVideos()

}

function searchVideo(){

let text = document.getElementById("search").value.toLowerCase()

let items = document.querySelectorAll(".video")

items.forEach(item=>{

let title = item.innerText.toLowerCase()

if(title.includes(text)){

item.style.display="block"

}else{

item.style.display="none"

}

})

}

showVideos()

</script>

</body>

</html>
