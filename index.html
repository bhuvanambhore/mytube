<!DOCTYPE html>
<html>

<head>

<title>MyTube</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f1f1f1;
}

header{
background:#ff0000;
color:white;
padding:15px;
font-size:24px;
}

.container{
padding:20px;
}

input{
padding:10px;
margin:5px;
}

button{
padding:10px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(270px,1fr));
gap:25px;
margin-top:20px;
}

.video{
background:white;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
overflow:hidden;
}

.player{
position:relative;
width:100%;
height:170px;
cursor:pointer;
overflow:hidden;
}

.player img{
width:100%;
height:100%;
object-fit:cover;
transition:0.3s;
}

.player:hover img{
transform:scale(1.08);
}

.duration{
position:absolute;
bottom:8px;
right:8px;
background:rgba(0,0,0,0.8);
color:white;
font-size:12px;
padding:2px 6px;
border-radius:3px;
}

iframe{
width:100%;
height:100%;
border:none;
}

.video-info{
padding:10px;
}

.title{
font-weight:bold;
font-size:15px;
margin-bottom:8px;
}

</style>

</head>

<body>

<header>
MyTube
</header>

<div class="container">

<input id="videoTitle" placeholder="Video topic">

<input id="videoLink" placeholder="Paste YouTube link">

<button onclick="addVideo()">Add Video</button>

<br><br>

<input id="search" placeholder="Search videos" onkeyup="searchVideo()">

<div class="grid" id="videoGrid"></div>

</div>

<script>

let videos = JSON.parse(localStorage.getItem("videos")) || []

function getID(url){

let reg = /(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/

let match = url.match(reg)

return match ? match[1] : null

}

function addVideo(){

let title=document.getElementById("videoTitle").value
let url=document.getElementById("videoLink").value

let id=getID(url)

if(!id){
alert("Invalid YouTube link")
return
}

videos.push({
title:title,
id:id
})

localStorage.setItem("videos",JSON.stringify(videos))

document.getElementById("videoTitle").value=""
document.getElementById("videoLink").value=""

showVideos()

}

function showVideos(){

let grid=document.getElementById("videoGrid")

grid.innerHTML=""

videos.forEach((v,index)=>{

let thumb="https://img.youtube.com/vi/"+v.id+"/0.jpg"

grid.innerHTML+=`

<div class="video">

<div class="player" onclick="playVideo(${index})" id="player${index}">

<img src="${thumb}">

<div class="duration">YouTube</div>

</div>

<div class="video-info">

<div class="title">${v.title}</div>

<button onclick="deleteVideo(${index})">Delete</button>

</div>

</div>

`

})

}

function playVideo(index){

let id=videos[index].id

let container=document.getElementById("player"+index)

container.innerHTML=`

<iframe
src="https://www.youtube.com/embed/${id}?autoplay=1"
allow="autoplay; fullscreen"
allowfullscreen>
</iframe>

`

}

function deleteVideo(index){

videos.splice(index,1)

localStorage.setItem("videos",JSON.stringify(videos))

showVideos()

}

function searchVideo(){

let text=document.getElementById("search").value.toLowerCase()

let items=document.querySelectorAll(".video")

items.forEach(item=>{

let title=item.innerText.toLowerCase()

item.style.display=title.includes(text)?"block":"none"

})

}

showVideos()

</script>

</body>

</html>
