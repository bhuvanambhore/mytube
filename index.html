<!DOCTYPE html>
<html>
<head>
<title>MyTube</title>

<style>

body{
font-family: Arial;
background:#f1f1f1;
margin:0;
}

header{
background:red;
color:white;
padding:15px;
font-size:24px;
}

.container{
padding:20px;
}

input{
padding:10px;
width:300px;
}

button{
padding:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.video{
background:white;
padding:10px;
border-radius:5px;
}

.video img{
width:100%;
}

</style>

</head>

<body>

<header>
MyTube
</header>

<div class="container">

<input id="videoLink" placeholder="Paste YouTube link">
<button onclick="addVideo()">Add Video</button>

<br><br>

<input id="search" placeholder="Search video" onkeyup="searchVideo()">

<div class="grid" id="videoGrid"></div>

</div>

<script>

let videos = JSON.parse(localStorage.getItem("videos")) || []

function getID(url){

let reg = /v=([^&]+)/

let match = url.match(reg)

if(match) return match[1]

return url.split("/").pop()

}

function addVideo(){

let url = document.getElementById("videoLink").value

let id = getID(url)

let thumb = "https://img.youtube.com/vi/"+id+"/0.jpg"

let video = {
id:id,
title:"YouTube Video",
thumb:thumb
}

videos.push(video)

localStorage.setItem("videos",JSON.stringify(videos))

showVideos()

}

function showVideos(){

let grid = document.getElementById("videoGrid")

grid.innerHTML=""

videos.forEach((v,i)=>{

grid.innerHTML+=`

<div class="video">

<img src="${v.thumb}">

<p>${v.title}</p>

<iframe width="100%" height="150"
src="https://www.youtube.com/embed/${v.id}">
</iframe>

<button onclick="deleteVideo(${i})">Delete</button>

</div>

`

})

}

function deleteVideo(i){

videos.splice(i,1)

localStorage.setItem("videos",JSON.stringify(videos))

showVideos()

}

function searchVideo(){

let s = document.getElementById("search").value.toLowerCase()

let items = document.querySelectorAll(".video")

items.forEach(v=>{

let t = v.innerText.toLowerCase()

v.style.display = t.includes(s) ? "block":"none"

})

}

showVideos()

</script>

</body>
</html>
