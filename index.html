<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTube V21</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

.dark{
background:#121212;
color:white;
}

header{
background:#ff0000;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header input{
padding:8px;
width:220px;
}

.container{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
}

.video{
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
position:relative;
}

.dark .video{
background:#1e1e1e;
}

.pin{
position:absolute;
top:6px;
right:6px;
background:gold;
padding:4px 6px;
font-size:12px;
border-radius:4px;
}

.thumbnail img{
width:100%;
height:160px;
object-fit:cover;
cursor:pointer;
}

.info{
padding:10px;
}

.category{
font-size:12px;
color:gray;
}

.progress{
font-size:11px;
color:#999;
}

button{
padding:6px 10px;
margin-top:6px;
cursor:pointer;
}

.preview img{
width:260px;
border-radius:8px;
margin-top:10px;
}

.filters{
margin:10px 0;
}

.filters button{
margin-right:6px;
}

.playlist-grid{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-top:20px;
}

.playlist-card{
width:260px;
cursor:pointer;
}

.playlist-thumb{
position:relative;
height:150px;
border-radius:8px;
overflow:hidden;
}

.playlist-thumb img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.7);
}

.overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
background:rgba(0,0,0,0.6);
padding:8px 16px;
border-radius:6px;
}

.count{
position:absolute;
bottom:8px;
right:8px;
color:white;
background:rgba(0,0,0,0.6);
padding:4px 6px;
border-radius:4px;
font-size:12px;
}

.player iframe{
width:100%;
height:70vh;
border:none;
}

.queue{
margin-top:20px;
background:white;
padding:10px;
border-radius:8px;
}

.queue-item{
display:flex;
gap:10px;
padding:8px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.queue-item img{
width:120px;
height:70px;
object-fit:cover;
}

.stats{
margin-top:20px;
background:white;
padding:15px;
border-radius:8px;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:white;
padding:20px;
border-radius:8px;
width:300px;
}

.popup-box input,
.popup-box select{
width:100%;
padding:8px;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>
<div>MyTube V21</div>

<div>
<input id="search" placeholder="Search videos" onkeyup="searchVideo()">
<button onclick="toggleDark()">🌙</button>
</div>

</header>

<div class="container">

<h3>Add Video</h3>

<input id="videoLink" placeholder="YouTube link" oninput="previewVideo()">
<input id="videoTitle" placeholder="Video title">

<select id="videoCategory">
<option>Finance</option>
<option>Coding</option>
<option>Education</option>
<option>Health Food</option>
<option>GK</option>
<option>Full Body Care</option>
<option>Gym/Yoga</option>
<option>Trade</option>
</select>

<input id="videoPlaylist" placeholder="Playlist name">

<button onclick="addVideo()">Add</button>

<div id="preview" class="preview"></div>

<h3>Filters</h3>

<div class="filters" id="categoryFilters"></div>

Sort:
<select onchange="setSort(this.value)">
<option value="new">Newest</option>
<option value="az">A-Z</option>
</select>

<h3>Videos</h3>
<div id="videoGrid" class="grid"></div>

<h3>Playlists</h3>
<div id="playlistCards" class="playlist-grid"></div>

<div id="playlistPage"></div>

<div class="stats">
<h3>Library Statistics</h3>
<div id="stats"></div>
</div>

<h3>Bulk Import</h3>
<textarea id="bulkLinks"></textarea>
<br>
<button onclick="bulkImport()">Import</button>

<h3>Backup</h3>
<button onclick="exportLibrary()">Export Backup</button>
<input type="file" onchange="importLibrary(this.files[0])">

</div>

<div id="editPopup" class="popup">
<div class="popup-box">

<h3>Edit Video</h3>

<input id="editTitle">

<select id="editCategory">
<option>Finance</option>
<option>Coding</option>
<option>Education</option>
<option>Health Food</option>
<option>GK</option>
<option>Full Body Care</option>
<option>Gym/Yoga</option>
<option>Trade</option>
</select>

<input id="editPlaylist">

<button onclick="saveEdit()">Save</button>
<button onclick="closePopup()">Cancel</button>

</div>
</div>

<script>

let videos=JSON.parse(localStorage.getItem("videos"))||[]
let progress=JSON.parse(localStorage.getItem("progress"))||[]
let editingID=null
let sortMode="new"
let filterCategory="All"

function save(){
localStorage.setItem("videos",JSON.stringify(videos))
}

function getID(url){
let r=/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/
let m=url.match(r)
return m?m[1]:null
}

function previewVideo(){

let url=videoLink.value
let id=getID(url)
if(!id)return

preview.innerHTML=`<img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">`

fetch("https://noembed.com/embed?url="+url)
.then(r=>r.json())
.then(d=>videoTitle.value=d.title)

}

function addVideo(){

let id=getID(videoLink.value)
let title=videoTitle.value
let cat=videoCategory.value
let pl=videoPlaylist.value.trim()

if(!pl||pl==="()"||pl==="undefined")pl="General"

if(videos.find(v=>v.id===id&&v.playlist===pl)){
alert("Duplicate in playlist")
return
}

videos.push({id,title,category:cat,playlist:pl,pin:false,date:Date.now()})

save()

show()

}

function show(){

let grid=document.getElementById("videoGrid")

let unique={}
videos.forEach(v=>unique[v.id]=v)

let list=Object.values(unique)

if(filterCategory!="All"){
list=list.filter(v=>v.category===filterCategory)
}

if(sortMode==="az"){
list.sort((a,b)=>a.title.localeCompare(b.title))
}

list.sort((a,b)=>b.pin-a.pin)

grid.innerHTML=""

list.forEach(v=>{

grid.innerHTML+=`
<div class="video">

${v.pin?'<div class="pin">PIN</div>':''}

<div class="thumbnail" onclick="playVideo('${v.id}')">
<img src="https://img.youtube.com/vi/${v.id}/hqdefault.jpg">
</div>

<div class="info">

<b>${v.title}</b>

<div class="category">${v.category}</div>

<div class="progress">
${progress.find(p=>p.id===v.id)?"Watched":"Not watched"}
</div>

<button onclick="openEdit('${v.id}')">Edit</button>
<button onclick="deleteVideo('${v.id}')">Delete</button>
<button onclick="pinVideo('${v.id}')">
${v.pin ? "Unpin" : "Pin"}
</button>

</div>

</div>
`
})

generateFilters()
generatePlaylists()
updateStats()

}

function pinVideo(id){

let found = false

videos.forEach(function(v){

if(v.id === id){

v.pin = !v.pin
found = true

}

})

if(!found) return

save()

show()

}

function openEdit(id){

let v=videos.find(v=>v.id===id)

editingID=id

editTitle.value=v.title
editCategory.value=v.category
editPlaylist.value=v.playlist

editPopup.style.display="flex"

}

function saveEdit(){

let v=videos.find(v=>v.id===editingID)

v.title=editTitle.value
v.category=editCategory.value
v.playlist=editPlaylist.value||"General"

save()

closePopup()

show()

}

function closePopup(){
editPopup.style.display="none"
}

function deleteVideo(id){

if(!confirm("Delete video?"))return

videos=videos.filter(v=>v.id!==id)

save()

show()

}

function playVideo(id){

progress.push({id})

localStorage.setItem("progress",JSON.stringify(progress))

let d=document.createElement("div")

d.style.position="fixed"
d.style.top="0"
d.style.left="0"
d.style.width="100%"
d.style.height="100%"
d.style.background="black"

d.innerHTML=`
<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" style="width:100%;height:100%"></iframe>
<button style="position:absolute;top:20px;right:20px" onclick="this.parentElement.remove()">Close</button>
`

document.body.appendChild(d)

}

function generateFilters(){

let cats=["All",...new Set(videos.map(v=>v.category))]

let box=document.getElementById("categoryFilters")

box.innerHTML=""

cats.forEach(c=>{
box.innerHTML+=`<button onclick="setFilter('${c}')">${c}</button>`
})

}

function setFilter(c){
filterCategory=c
show()
}

function setSort(s){
sortMode=s
show()
}

function generatePlaylists(){

let map = {}

videos.forEach(function(v){

let name = v.playlist

/* CLEAN INVALID PLAYLIST NAMES */

if(!name) return

name = name.trim()

if(name === "") return
if(name === "()") return
if(name === "undefined") return
if(name === "null") return

/* CREATE PLAYLIST */

if(!map[name]){
map[name] = []
}

map[name].push(v)

})

playlistCards.innerHTML = ""

/* BUILD PLAYLIST CARDS */

for(let p in map){

let first = map[p][0]

playlistCards.innerHTML += `
<div class="playlist-card" onclick="openPlaylist('${p}')">

<div class="playlist-thumb">

<img src="https://img.youtube.com/vi/${first.id}/hqdefault.jpg">

<div class="overlay">Play all</div>

<div class="count">${map[p].length} videos</div>

</div>

<b>${p}</b>

</div>
`

}

}
  
function openPlaylist(name){

let list=videos.filter(v=>v.playlist===name)

playlistPage.innerHTML=`
<h2>${name}</h2>
<div class="player" id="player"></div>
<div class="queue" id="queue"></div>
`

playInline(list[0].id)

queue.innerHTML=""

list.forEach((v,i)=>{
queue.innerHTML+=`
<div class="queue-item" onclick="playInline('${v.id}')">
<img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg">
<b>${i+1}. ${v.title}</b>
</div>
`
})

}

function playInline(id){
player.innerHTML=`<iframe src="https://www.youtube.com/embed/${id}?autoplay=1"></iframe>`
}

function searchVideo(){

let t=search.value.toLowerCase()

document.querySelectorAll(".video").forEach(v=>{
v.style.display=v.innerText.toLowerCase().includes(t)?"block":"none"
})

}

function bulkImport(){

bulkLinks.value.split("\n").forEach(l=>{

let id=getID(l)

if(id){
videos.push({id,title:"Imported",category:"Education",playlist:"Imported",date:Date.now()})
}

})

save()

show()

}

function exportLibrary(){

let blob=new Blob([JSON.stringify(videos)],{type:"application/json"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="mytube_backup.json"

a.click()

}

function importLibrary(file){

let r=new FileReader()

r.onload=e=>{
videos=JSON.parse(e.target.result)
save()
show()
}

r.readAsText(file)

}

function updateStats(){

let u=[...new Set(videos.map(v=>v.id))].length
let p=[...new Set(videos.map(v=>v.playlist))].length

stats.innerHTML=`Unique videos: ${u}<br>Playlists: ${p}<br>Total entries: ${videos.length}`

}

function toggleDark(){
document.body.classList.toggle("dark")
}

show()

</script>

</body>
</html>
