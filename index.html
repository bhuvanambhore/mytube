<!DOCTYPE html>
<html>
<head>
<title>MyTube V17</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{font-family:Arial;margin:0;background:#f5f5f5;color:#000}
.dark{background:#121212;color:#fff}

header{background:#ff0000;color:#fff;padding:15px;display:flex;justify-content:space-between;align-items:center}
header input{padding:8px;width:220px}

.container{padding:20px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}

.video{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,0.15)}
.dark .video{background:#1e1e1e}

.thumbnail img{width:100%;height:160px;object-fit:cover;cursor:pointer}

.info{padding:10px}
.category{font-size:12px;color:#777}
.playlists{font-size:12px;color:#999}

.preview img{width:260px;border-radius:8px;margin-top:10px}

.favorite{font-size:18px;cursor:pointer;color:gold}

.playlist-grid{display:flex;gap:20px;flex-wrap:wrap;margin-top:20px}

.playlist-card{width:260px;cursor:pointer}
.playlist-thumb{position:relative;height:150px;border-radius:8px;overflow:hidden}
.playlist-thumb img{width:100%;height:100%;object-fit:cover;filter:brightness(0.7)}

.overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.6);color:white;padding:6px 12px;border-radius:6px}
.count{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.6);color:white;padding:4px 6px;border-radius:4px;font-size:12px}

.player iframe{width:100%;height:70vh;border:none}

.queue{margin-top:20px;background:white;padding:10px;border-radius:8px}
.dark .queue{background:#1e1e1e}

.queue-item{display:flex;gap:10px;padding:8px;cursor:pointer;border-bottom:1px solid #eee}
.queue-item img{width:120px;height:70px;object-fit:cover}

.section{margin-top:35px}

button{padding:6px 10px;margin-top:6px;cursor:pointer}

.progress{height:4px;background:red;width:0%}

</style>
</head>

<body>

<header>

<div>MyTube V17</div>

<div>
<input id="search" placeholder="Search videos" onkeyup="searchVideo()">
<button onclick="toggleDark()">🌙</button>
</div>

</header>

<div class="container">

<h3>Add Video</h3>

<input id="videoLink" placeholder="YouTube link" oninput="previewVideo()">
<input id="videoTitle" placeholder="Video title">

<select id="videoCategory">
<option>Finance</option>
<option>Coding</option>
<option>Education</option>
<option>Health Food</option>
<option>GK</option>
<option>Full Body Care</option>
<option>Gym/Yoga</option>
<option>Trade</option>
</select>

<input id="videoPlaylist" placeholder="Playlists (comma separated)">
<button onclick="addVideo()">Add</button>

<div id="preview" class="preview"></div>

<div class="section">
<h3>Continue Watching</h3>
<div id="continueGrid" class="grid"></div>
</div>

<div class="section">
<h3>Trending</h3>
<div id="trendingGrid" class="grid"></div>
</div>

<div class="section">
<h4>Category</h4>

<button onclick="filterCategory('All')">All</button>
<button onclick="filterCategory('Finance')">Finance</button>
<button onclick="filterCategory('Coding')">Coding</button>
<button onclick="filterCategory('Education')">Education</button>
<button onclick="filterCategory('Health Food')">Health Food</button>
<button onclick="filterCategory('GK')">GK</button>
<button onclick="filterCategory('Full Body Care')">Full Body Care</button>
<button onclick="filterCategory('Gym/Yoga')">Gym/Yoga</button>
<button onclick="filterCategory('Trade')">Trade</button>

</div>

<h3>Videos</h3>
<div id="videoGrid" class="grid"></div>

<h3>Playlists</h3>
<div id="playlistCards" class="playlist-grid"></div>
<div id="playlistPage"></div>

<div class="section">
<h3>Bulk Import</h3>
<textarea id="bulkLinks"></textarea><br>
<button onclick="bulkImport()">Import</button>
</div>

<div class="section">
<h3>Library Tools</h3>
<button onclick="exportLibrary()">Export Backup</button>
<input type="file" id="importFile" onchange="importLibrary()">
</div>

</div>

<script>

let videos=JSON.parse(localStorage.getItem("videos"))||[]
let currentCategory="All"
let currentPlaylistQueue=[]
let currentIndex=0

function saveVideos(){localStorage.setItem("videos",JSON.stringify(videos))}

function getID(url){
let r=/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/
let m=url.match(r)
return m?m[1]:null
}

function previewVideo(){

let url=document.getElementById("videoLink").value
let id=getID(url)
if(!id)return

let thumb="https://img.youtube.com/vi/"+id+"/hqdefault.jpg"
document.getElementById("preview").innerHTML=`<img src="${thumb}">`

fetch("https://noembed.com/embed?url="+url)
.then(r=>r.json())
.then(d=>{document.getElementById("videoTitle").value=d.title})

}

function addVideo(){

let title=document.getElementById("videoTitle").value
let url=document.getElementById("videoLink").value
let category=document.getElementById("videoCategory").value
let playlists=document.getElementById("videoPlaylist").value.split(",").map(p=>p.trim())

let id=getID(url)

let existing=videos.find(v=>v.id===id)

if(existing){

playlists.forEach(p=>{
if(!existing.playlists.includes(p)) existing.playlists.push(p)
})

saveVideos()
showVideos()
return
}

videos.push({
title,
id,
category,
playlists,
favorite:false,
watched:false,
progress:0,
views:0
})

saveVideos()
showVideos()

}

function toggleFavorite(i){
videos[i].favorite=!videos[i].favorite
saveVideos()
showVideos()
}

function deleteVideo(i){
if(confirm("Delete video?")){
videos.splice(i,1)
saveVideos()
showVideos()
}
}

function editVideo(i){
let t=prompt("Edit title",videos[i].title)
if(t)videos[i].title=t
saveVideos()
showVideos()
}

function showVideos(){

let grid=document.getElementById("videoGrid")
grid.innerHTML=""

videos.forEach((v,i)=>{

if(currentCategory!="All" && v.category!=currentCategory)return

let thumb="https://img.youtube.com/vi/"+v.id+"/hqdefault.jpg"

grid.innerHTML+=`

<div class="video">

<div class="thumbnail" onclick="playVideo('${v.id}',${i})">
<img src="${thumb}">
<div class="progress" style="width:${v.progress}%"></div>
</div>

<div class="info">

<b>${v.title}</b><br>
<div class="category">${v.category}</div>
<div class="playlists">${v.playlists.join(", ")}</div>

<span class="favorite" onclick="toggleFavorite(${i})">${v.favorite?'⭐':'☆'}</span>

<button onclick="editVideo(${i})">Edit</button>
<button onclick="deleteVideo(${i})">Delete</button>

</div>

</div>

`

})

generatePlaylists()
generateContinueWatching()
generateTrending()

}

function playVideo(id,index){

videos[index].views++
videos[index].watched=true
saveVideos()

let container=document.createElement("div")

container.style.position="fixed"
container.style.top="0"
container.style.left="0"
container.style.width="100%"
container.style.height="100%"
container.style.background="black"
container.style.zIndex="9999"

let iframe=document.createElement("iframe")
iframe.src="https://www.youtube.com/embed/"+id+"?autoplay=1&enablejsapi=1"
iframe.allow="autoplay; fullscreen"
iframe.allowFullscreen=true
iframe.style.width="100%"
iframe.style.height="100%"
iframe.style.border="none"

let close=document.createElement("button")
close.innerHTML="✕ Close"
close.style.position="absolute"
close.style.top="20px"
close.style.right="20px"

close.onclick=()=>{
container.remove()
if(document.fullscreenElement)document.exitFullscreen()
}

container.appendChild(iframe)
container.appendChild(close)

document.body.appendChild(container)

container.requestFullscreen?.()

}

function generatePlaylists(){

let playlists={}

videos.forEach(v=>{
v.playlists.forEach(p=>{
if(!playlists[p])playlists[p]=[]
playlists[p].push(v)
})
})

let box=document.getElementById("playlistCards")
box.innerHTML=""

for(let name in playlists){

let first=playlists[name][0]
let count=playlists[name].length
let thumb="https://img.youtube.com/vi/"+first.id+"/hqdefault.jpg"

box.innerHTML+=`
<div class="playlist-card" onclick="openPlaylist('${name}')">
<div class="playlist-thumb">
<img src="${thumb}">
<div class="overlay">▶ Play all</div>
<div class="count">${count} videos</div>
</div>
<b>${name}</b>
</div>
`

}

}

function openPlaylist(name){

let list=videos.filter(v=>v.playlists.includes(name))
currentPlaylistQueue=list

let page=document.getElementById("playlistPage")
page.innerHTML=`<h2>${name}</h2><div class="player" id="player"></div><div class="queue" id="queue"></div>`

playVideoInline(list[0].id)

let q=document.getElementById("queue")
q.innerHTML=""

list.forEach((v,i)=>{

let thumb="https://img.youtube.com/vi/"+v.id+"/mqdefault.jpg"

q.innerHTML+=`

<div class="queue-item" onclick="playVideoInline('${v.id}')">
<img src="${thumb}">
<div><b>${i+1}. ${v.title}</b><br>${v.category}</div>
</div>

`

})

}

function playVideoInline(id){
document.getElementById("player").innerHTML=`<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allowfullscreen></iframe>`
}

function generateContinueWatching(){

let box=document.getElementById("continueGrid")
box.innerHTML=""

videos.filter(v=>v.progress>0 && v.progress<90).forEach(v=>{

let thumb="https://img.youtube.com/vi/"+v.id+"/hqdefault.jpg"

box.innerHTML+=`
<div class="video">
<div class="thumbnail" onclick="playVideoInline('${v.id}')">
<img src="${thumb}">
</div>
<div class="info">${v.title}</div>
</div>
`

})

}

function generateTrending(){

let box=document.getElementById("trendingGrid")
box.innerHTML=""

let sorted=[...videos].sort((a,b)=>b.views-a.views).slice(0,6)

sorted.forEach(v=>{

let thumb="https://img.youtube.com/vi/"+v.id+"/hqdefault.jpg"

box.innerHTML+=`
<div class="video">
<div class="thumbnail" onclick="playVideoInline('${v.id}')">
<img src="${thumb}">
</div>
<div class="info">${v.title}</div>
</div>
`

})

}

function filterCategory(cat){
currentCategory=cat
showVideos()
}

function searchVideo(){

let text=document.getElementById("search").value.toLowerCase()

document.querySelectorAll(".video").forEach(v=>{
v.style.display=v.innerText.toLowerCase().includes(text)?"block":"none"
})

}

function bulkImport(){

let lines=document.getElementById("bulkLinks").value.split("\n")

lines.forEach(link=>{
let id=getID(link)
if(id && !videos.some(v=>v.id==id)){
videos.push({
title:"Imported",
id,
category:"Education",
playlists:["Imported"],
favorite:false,
watched:false,
progress:0,
views:0
})
}
})

saveVideos()
showVideos()

}

function exportLibrary(){

let blob=new Blob([JSON.stringify(videos)],{type:"application/json"})
let url=URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=url
a.download="mytube_backup.json"
a.click()

}

function importLibrary(){

let file=document.getElementById("importFile").files[0]

let reader=new FileReader()

reader.onload=function(e){
videos=JSON.parse(e.target.result)
saveVideos()
showVideos()
}

reader.readAsText(file)

}

function toggleDark(){
document.body.classList.toggle("dark")
}

showVideos()

</script>

</body>
</html>
