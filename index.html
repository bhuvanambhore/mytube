<!DOCTYPE html>
<html>

<head>

<title>MyTube V8</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#ff0000;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header input{
padding:8px;
width:220px;
}

.container{
padding:20px;
}

input,select,textarea{
padding:10px;
margin:5px;
}

button{
padding:8px 12px;
margin:4px;
cursor:pointer;
border:none;
background:#eee;
border-radius:4px;
}

button:hover{
background:#ddd;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
margin-top:20px;
}

.video{
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.thumbnail{
cursor:pointer;
height:160px;
}

.thumbnail img{
width:100%;
height:100%;
object-fit:cover;
}

iframe{
width:100%;
height:160px;
border:none;
}

.info{
padding:10px;
}

.title{
font-weight:bold;
}

.category{
font-size:12px;
color:gray;
}

.playlist{
font-size:12px;
color:#444;
}

.playlist-grid{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-top:15px;
}

.playlist-card{
width:260px;
cursor:pointer;
}

.playlist-thumb{
position:relative;
height:150px;
border-radius:8px;
overflow:hidden;
}

.playlist-thumb img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.7);
}

.play-overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:18px;
font-weight:bold;
background:rgba(0,0,0,0.6);
padding:10px 20px;
border-radius:8px;
}

.play-count{
position:absolute;
bottom:8px;
right:8px;
color:white;
font-size:12px;
background:rgba(0,0,0,0.6);
padding:4px 6px;
border-radius:4px;
}

.playlist-title{
margin-top:6px;
font-weight:bold;
}

.section{
margin-top:35px;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

.modalBox{
background:white;
padding:20px;
width:400px;
border-radius:8px;
}

</style>

</head>

<body>

<header>

<div>MyTube V8</div>

<input id="search" placeholder="Search videos" onkeyup="searchVideo()">

</header>

<div class="container">

<h3>Add Video</h3>

<input id="videoLink" placeholder="YouTube link">

<input id="videoTitle" placeholder="Video title">

<select id="videoCategory">

<option value="Finance">Finance</option>
<option value="Coding">Coding</option>
<option value="Education">Education</option>
<option value="Health Food">Health Food</option>
<option value="GK">GK</option>
<option value="Full Body Care">Full Body Care</option>
<option value="Gym/Yoga">Gym/Yoga</option>
<option value="Trade">Trade</option>

</select>

<input id="videoPlaylist" placeholder="Playlist name">

<button onclick="addVideo()">Add</button>

<div class="section">

<h4>Category</h4>

<button onclick="filterCategory('All')">All</button>
<button onclick="filterCategory('Finance')">Finance</button>
<button onclick="filterCategory('Coding')">Coding</button>
<button onclick="filterCategory('Education')">Education</button>
<button onclick="filterCategory('Health Food')">Health Food</button>
<button onclick="filterCategory('GK')">GK</button>
<button onclick="filterCategory('Full Body Care')">Full Body Care</button>
<button onclick="filterCategory('Gym/Yoga')">Gym/Yoga</button>
<button onclick="filterCategory('Trade')">Trade</button>

</div>

<div id="videoGrid" class="grid"></div>

<div class="section">

<h3>Playlists</h3>

<div id="playlistCards" class="playlist-grid"></div>

</div>

<div class="section">

<h3>Bulk Import</h3>

<textarea id="bulkLinks" rows="4" cols="60"></textarea>

<br>

<button onclick="bulkImport()">Import</button>

</div>

<div class="section">

<h3>Library Tools</h3>

<button onclick="exportLibrary()">Export Backup</button>

<input type="file" id="importFile" onchange="importLibrary()">

</div>

</div>

<div id="editModal" class="modal">

<div class="modalBox">

<h3>Edit Video</h3>

<input id="editTitle">

<select id="editCategory">

<option>Finance</option>
<option>Coding</option>
<option>Education</option>
<option>Health Food</option>
<option>GK</option>
<option>Full Body Care</option>
<option>Gym/Yoga</option>
<option>Trade</option>

</select>

<h4>Select Playlist</h4>

<div id="editPlaylists"></div>

<br>

<button onclick="saveEdit()">Save</button>

<button onclick="closeEdit()">Cancel</button>

</div>

</div>

<script>

let videos=JSON.parse(localStorage.getItem("videos"))||[]
let currentCategory="All"
let currentPlaylist="All"
let editIndex=null
let editSelectedPlaylist=""

function saveVideos(){
localStorage.setItem("videos",JSON.stringify(videos))
}

function getID(url){
let r=/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/
let m=url.match(r)
return m?m[1]:null
}

function addVideo(){

let title=document.getElementById("videoTitle").value
let url=document.getElementById("videoLink").value
let category=document.getElementById("videoCategory").value
let playlist=document.getElementById("videoPlaylist").value

let id=getID(url)

if(!id) return alert("Invalid link")

videos.push({title,id,category,playlist})

saveVideos()
showVideos()

}

function showVideos(){

let grid=document.getElementById("videoGrid")
grid.innerHTML=""

videos.forEach((v,i)=>{

if(currentCategory!="All" && v.category!=currentCategory) return
if(currentPlaylist!="All" && v.playlist!=currentPlaylist) return

let thumb="https://img.youtube.com/vi/"+v.id+"/hqdefault.jpg"

grid.innerHTML+=`

<div class="video">

<div class="thumbnail" onclick="playVideo(${i})" id="player${i}">
<img src="${thumb}">
</div>

<div class="info">

<div class="title">${v.title}</div>

<div class="category">${v.category}</div>

<div class="playlist">${v.playlist}</div>

<button onclick="openEdit(${i})">Edit</button>
<button onclick="deleteVideo(${i})">Delete</button>

</div>

</div>

`

})

generatePlaylists()

}

function playVideo(i){

document.getElementById("player"+i).innerHTML=
'<iframe src="https://www.youtube.com/embed/'+videos[i].id+'?autoplay=1"></iframe>'

}

function deleteVideo(i){

videos.splice(i,1)

saveVideos()
showVideos()

}

function generatePlaylists(){

let box=document.getElementById("playlistCards")

let playlists={}

videos.forEach(v=>{
if(v.playlist){
if(!playlists[v.playlist]) playlists[v.playlist]=[]
playlists[v.playlist].push(v)
}
})

box.innerHTML=""

for(let name in playlists){

let first=playlists[name][0]

let count=playlists[name].length

let thumb="https://img.youtube.com/vi/"+first.id+"/hqdefault.jpg"

box.innerHTML+=`

<div class="playlist-card" onclick="playPlaylist('${name}')">

<div class="playlist-thumb">

<img src="${thumb}">

<div class="play-overlay">▶ Play all</div>

<div class="play-count">${count} videos</div>

</div>

<div class="playlist-title">${name}</div>

</div>

`

}

}

function playPlaylist(name){

currentPlaylist=name

showVideos()

let first=videos.findIndex(v=>v.playlist==name)

setTimeout(()=>{
if(first>=0) playVideo(first)
},300)

}

function searchVideo(){

let text=document.getElementById("search").value.toLowerCase()

document.querySelectorAll(".video").forEach(v=>{
v.style.display=v.innerText.toLowerCase().includes(text)?"block":"none"
})

}

function bulkImport(){

let lines=document.getElementById("bulkLinks").value.split("\n")

lines.forEach(link=>{
let id=getID(link)
if(id) videos.push({title:"Imported",id,category:"Education",playlist:"Imported"})
})

saveVideos()
showVideos()

}

function exportLibrary(){

let blob=new Blob([JSON.stringify(videos)],{type:"application/json"})

let url=URL.createObjectURL(blob)

let a=document.createElement("a")

a.href=url
a.download="mytube_backup.json"

a.click()

}

function importLibrary(){

let file=document.getElementById("importFile").files[0]

let reader=new FileReader()

reader.onload=function(e){

videos=JSON.parse(e.target.result)

saveVideos()
showVideos()

}

reader.readAsText(file)

}

showVideos()

</script>

</body>

</html>
