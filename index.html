<!DOCTYPE html>
<html>

<head>

<title>MyTube</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f9f9f9;
}

header{
background:#ff0000;
color:white;
padding:15px;
font-size:24px;
}

.container{
padding:20px;
}

input,select{
padding:10px;
margin:5px;
}

button{
padding:8px;
margin:2px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:25px;
margin-top:20px;
}

.video{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.thumbnail{
position:relative;
cursor:pointer;
height:170px;
}

.thumbnail img{
width:100%;
height:100%;
object-fit:cover;
}

iframe{
width:100%;
height:170px;
border:none;
}

.info{
padding:10px;
}

.title{
font-weight:bold;
margin-bottom:5px;
}

.category{
font-size:12px;
color:gray;
margin-bottom:6px;
}

</style>

</head>

<body>

<header>
MyTube
</header>

<div class="container">

<input id="videoTitle" placeholder="Video title">

<input id="videoLink" placeholder="Paste YouTube link">

<select id="videoCategory">

<option value="Finance">Finance</option>
<option value="Coding">Coding</option>
<option value="Education">Education</option>
<option value="Health Food">Health Food</option>
<option value="GK">GK</option>
<option value="Full Body Care">Full Body Care</option>
<option value="Gym/Yoga">Gym/Yoga</option>
<option value="Trade">Trade</option>

</select>

<button onclick="addVideo()">Add Video</button>

<div class="grid" id="videoGrid"></div>

</div>

<script>

let videos = JSON.parse(localStorage.getItem("videos")) || []

function getID(url){

let reg=/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/

let match=url.match(reg)

return match?match[1]:null

}

function addVideo(){

let title=document.getElementById("videoTitle").value
let url=document.getElementById("videoLink").value
let category=document.getElementById("videoCategory").value

let id=getID(url)

if(!id){
alert("Invalid YouTube link")
return
}

videos.push({
title:title,
id:id,
category:category
})

localStorage.setItem("videos",JSON.stringify(videos))

document.getElementById("videoTitle").value=""
document.getElementById("videoLink").value=""

showVideos()

}

function showVideos(){

let grid=document.getElementById("videoGrid")

grid.innerHTML=""

videos.forEach((v,index)=>{

let thumb="https://img.youtube.com/vi/"+v.id+"/hqdefault.jpg"

grid.innerHTML+=`

<div class="video">

<div class="thumbnail" onclick="playVideo(${index})" id="player${index}">
<img src="${thumb}">
</div>

<div class="info">

<div class="title">${v.title}</div>

<div class="category">${v.category}</div>

<button onclick="editVideo(${index})">Edit</button>

<button onclick="deleteVideo(${index})">Delete</button>

</div>

</div>

`

})

}

function playVideo(index){

let id=videos[index].id

let container=document.getElementById("player"+index)

container.innerHTML=`

<iframe
src="https://www.youtube.com/embed/${id}?autoplay=1"
allowfullscreen>
</iframe>

`

}

function deleteVideo(index){

videos.splice(index,1)

localStorage.setItem("videos",JSON.stringify(videos))

showVideos()

}

function editVideo(index){

let newTitle=prompt("Edit title",videos[index].title)

if(newTitle!=null){

let newCategory=prompt("Edit category",videos[index].category)

videos[index].title=newTitle
videos[index].category=newCategory

localStorage.setItem("videos",JSON.stringify(videos))

showVideos()

}

}

showVideos()

</script>

</body>

</html>
