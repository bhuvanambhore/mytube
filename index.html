<!DOCTYPE html>
<html>

<head>

<title>MyTube V17</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">
MyTube V17
</div>

<div class="header-right">

<input 
id="search"
placeholder="Search videos"
onkeyup="searchVideo()"
>

<button onclick="toggleDark()">🌙</button>

</div>

</header>

<div class="container">

<!-- ADD VIDEO -->

<section>

<h2>Add Video</h2>

<input 
id="videoLink"
placeholder="Paste YouTube link"
oninput="previewVideo()"
>

<input 
id="videoTitle"
placeholder="Video title"
>

<select id="videoCategory">

<option value="Finance">Finance</option>
<option value="Coding">Coding</option>
<option value="Education">Education</option>
<option value="Health Food">Health Food</option>
<option value="GK">GK</option>
<option value="Full Body Care">Full Body Care</option>
<option value="Gym/Yoga">Gym/Yoga</option>
<option value="Trade">Trade</option>

</select>

<input 
id="videoPlaylist"
placeholder="Playlists (comma separated)"
>

<button onclick="addVideo()">
Add Video
</button>

<div id="preview"></div>

</section>

<!-- CATEGORY FILTER -->

<section>

<h3>Category</h3>

<div class="category-bar">

<button onclick="filterCategory('All')">All</button>
<button onclick="filterCategory('Finance')">Finance</button>
<button onclick="filterCategory('Coding')">Coding</button>
<button onclick="filterCategory('Education')">Education</button>
<button onclick="filterCategory('Health Food')">Health Food</button>
<button onclick="filterCategory('GK')">GK</button>
<button onclick="filterCategory('Full Body Care')">Full Body Care</button>
<button onclick="filterCategory('Gym/Yoga')">Gym/Yoga</button>
<button onclick="filterCategory('Trade')">Trade</button>

</div>

</section>

<!-- CONTINUE WATCHING -->

<section>

<h3>Continue Watching</h3>

<div id="continueWatching" class="grid"></div>

</section>

<!-- VIDEOS -->

<section>

<h3>Videos</h3>

<div id="videoGrid" class="grid"></div>

</section>

<!-- PLAYLISTS -->

<section>

<h3>Playlists</h3>

<div id="playlistCards" class="playlist-grid"></div>

</section>

<!-- PLAYLIST PAGE -->

<section>

<div id="playlistPage"></div>

</section>

<!-- TRENDING -->

<section>

<h3>Trending</h3>

<div id="trendingVideos" class="grid"></div>

</section>

<!-- BULK IMPORT -->

<section>

<h3>Bulk Import</h3>

<textarea 
id="bulkLinks"
placeholder="Paste multiple YouTube links"
></textarea>

<button onclick="bulkImport()">
Import Videos
</button>

</section>

<!-- LIBRARY -->

<section>

<h3>Library Tools</h3>

<button onclick="exportLibrary()">
Export Backup
</button>

<input 
type="file"
id="importFile"
onchange="importLibrary()"
>

</section>

</div>

<script src="app.js"></script>

</body>

</html>
