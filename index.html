<!DOCTYPE html>
<html>

<head>

<title>MyTube V15</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

.dark{
background:#121212;
color:white;
}

header{
background:#ff0000;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header input{
padding:8px;
width:220px;
}

.container{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
}

.video{
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.dark .video{
background:#1e1e1e;
}

.thumbnail img{
width:100%;
height:160px;
object-fit:cover;
cursor:pointer;
}

.info{
padding:10px;
}

.category{
font-size:12px;
color:gray;
}

.playlist{
font-size:12px;
color:#999;
}

button{
padding:6px 10px;
margin-top:6px;
cursor:pointer;
}

.preview img{
width:260px;
border-radius:8px;
margin-top:10px;
}

.playlist-grid{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-top:20px;
}

.playlist-card{
width:260px;
cursor:pointer;
}

.playlist-thumb{
position:relative;
height:150px;
border-radius:8px;
overflow:hidden;
}

.playlist-thumb img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.7);
}

.overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
background:rgba(0,0,0,0.6);
padding:8px 16px;
border-radius:6px;
}

.count{
position:absolute;
bottom:8px;
right:8px;
color:white;
background:rgba(0,0,0,0.6);
padding:4px 6px;
border-radius:4px;
font-size:12px;
}

.player iframe{
width:100%;
height:70vh;
border:none;
}

.queue{
margin-top:20px;
background:white;
padding:10px;
border-radius:8px;
}

.dark .queue{
background:#1e1e1e;
}

.queue-item{
display:flex;
gap:10px;
padding:8px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.queue-item img{
width:120px;
height:70px;
object-fit:cover;
}

.section{
margin-top:35px;
}

</style>

</head>

<body>

<header>

<div>MyTube V15</div>

<div>

<input id="search" placeholder="Search videos" onkeyup="searchVideo()">

<button onclick="toggleDark()">🌙</button>

</div>

</header>

<div class="container">

<h3>Add Video</h3>

<input id="videoLink" placeholder="YouTube link" oninput="previewVideo()">

<input id="videoTitle" placeholder="Video title">

<select id="videoCategory">

<option>Finance</option>
<option>Coding</option>
<option>Education</option>
<option>Health Food</option>
<option>GK</option>
<option>Full Body Care</option>
<option>Gym/Yoga</option>
<option>Trade</option>

</select>

<input id="videoPlaylist" placeholder="Playlist name">

<button onclick="addVideo()">Add</button>

<div id="preview" class="preview"></div>

<h3>Videos</h3>

<div id="videoGrid" class="grid"></div>

<h3>Playlists</h3>

<div id="playlistCards" class="playlist-grid"></div>

<div id="playlistPage"></div>

<div class="section">

<h3>Bulk Import</h3>

<textarea id="bulkLinks"></textarea>

<br>

<button onclick="bulkImport()">Import</button>

</div>

<div class="section">

<h3>Library Tools</h3>

<button onclick="exportLibrary()">Export Backup</button>

<input type="file" id="importFile" onchange="importLibrary()">

</div>

</div>

<script>

let videos = JSON.parse(localStorage.getItem("videos")) || []

function saveVideos(){
localStorage.setItem("videos",JSON.stringify(videos))
}

function getID(url){
let r=/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/
let m=url.match(r)
return m?m[1]:null
}

/* PREVIEW */

function previewVideo(){

let url=document.getElementById("videoLink").value
let id=getID(url)

if(!id) return

let thumb="https://img.youtube.com/vi/"+id+"/hqdefault.jpg"

document.getElementById("preview").innerHTML=`<img src="${thumb}">`

fetch("https://noembed.com/embed?url="+url)
.then(r=>r.json())
.then(data=>{
document.getElementById("videoTitle").value=data.title
})

}

/* ADD VIDEO */

function addVideo(){

let title=document.getElementById("videoTitle").value
let url=document.getElementById("videoLink").value
let category=document.getElementById("videoCategory").value
let playlist=document.getElementById("videoPlaylist").value

let id=getID(url)

/* block duplicate in same playlist */

let duplicate=videos.find(v=>v.id===id && v.playlist===playlist)

if(duplicate){
alert("Video already exists in this playlist")
return
}

/* allow across playlists */

videos.push({title,id,category,playlist})

saveVideos()

showVideos()

}

/* UNIQUE VIDEO GRID */

function showVideos(){

let grid=document.getElementById("videoGrid")

grid.innerHTML=""

let unique={}

videos.forEach(v=>{unique[v.id]=v})

Object.values(unique).forEach(v=>{

let thumb="https://img.youtube.com/vi/"+v.id+"/hqdefault.jpg"

grid.innerHTML+=`

<div class="video">

<div class="thumbnail" onclick="playVideo('${v.id}')">
<img src="${thumb}">
</div>

<div class="info">

<b>${v.title}</b>

<div class="category">${v.category}</div>

<button onclick="editVideo('${v.id}')">Edit</button>
<button onclick="deleteVideo('${v.id}')">Delete</button>

</div>

</div>

`

})

generatePlaylists()

}

/* DELETE */

function deleteVideo(id){

videos = videos.filter(v=>v.id!==id)

saveVideos()

showVideos()

}

/* EDIT */

function editVideo(id){

let v=videos.find(v=>v.id===id)

let title=prompt("Edit title",v.title)

if(title) v.title=title

saveVideos()

showVideos()

}

/* PLAYER */

function playVideo(id){

let container=document.createElement("div")

container.style.position="fixed"
container.style.top="0"
container.style.left="0"
container.style.width="100%"
container.style.height="100%"
container.style.background="black"
container.style.zIndex="9999"

let iframe=document.createElement("iframe")

iframe.src="https://www.youtube.com/embed/"+id+"?autoplay=1"

iframe.allowFullscreen=true

iframe.style.width="100%"
iframe.style.height="100%"

let close=document.createElement("button")

close.innerHTML="✕ Close"

close.style.position="absolute"
close.style.top="20px"
close.style.right="20px"

close.onclick=()=>container.remove()

container.appendChild(iframe)
container.appendChild(close)

document.body.appendChild(container)

}

/* PLAYLISTS */

function generatePlaylists(){

let playlists={}

videos.forEach(v=>{
if(!playlists[v.playlist]) playlists[v.playlist]=[]
playlists[v.playlist].push(v)
})

let box=document.getElementById("playlistCards")

box.innerHTML=""

for(let name in playlists){

let first=playlists[name][0]

let count=playlists[name].length

let thumb="https://img.youtube.com/vi/"+first.id+"/hqdefault.jpg"

box.innerHTML+=`

<div class="playlist-card" onclick="openPlaylist('${name}')">

<div class="playlist-thumb">

<img src="${thumb}">

<div class="overlay">▶ Play all</div>

<div class="count">${count} videos</div>

</div>

<b>${name}</b>

</div>

`

}

}

/* PLAYLIST PAGE */

function openPlaylist(name){

let list=videos.filter(v=>v.playlist===name)

let page=document.getElementById("playlistPage")

let first=list[0]

page.innerHTML=`

<h2>${name}</h2>

<div class="player" id="player"></div>

<div class="queue" id="queue"></div>

`

playVideoInline(first.id)

let q=document.getElementById("queue")

q.innerHTML=""

list.forEach((v,i)=>{

let thumb="https://img.youtube.com/vi/"+v.id+"/mqdefault.jpg"

q.innerHTML+=`

<div class="queue-item" onclick="playVideoInline('${v.id}')">

<img src="${thumb}">

<div>

<b>${i+1}. ${v.title}</b>

</div>

</div>

`

})

}

function playVideoInline(id){

document.getElementById("player").innerHTML=

`<iframe src="https://www.youtube.com/embed/${id}?autoplay=1"></iframe>`

}

/* SEARCH */

function searchVideo(){

let text=document.getElementById("search").value.toLowerCase()

document.querySelectorAll(".video").forEach(v=>{

v.style.display=v.innerText.toLowerCase().includes(text)?"block":"none"

})

}

/* BULK IMPORT */

function bulkImport(){

let lines=document.getElementById("bulkLinks").value.split("\n")

lines.forEach(link=>{

let id=getID(link)

if(id){

videos.push({

title:"Imported",

id:id,

category:"Education",

playlist:"Imported"

})

}

})

saveVideos()

showVideos()

}

/* BACKUP */

function exportLibrary(){

let blob=new Blob([JSON.stringify(videos)],{type:"application/json"})

let url=URL.createObjectURL(blob)

let a=document.createElement("a")

a.href=url

a.download="mytube_backup.json"

a.click()

}

function importLibrary(){

let file=document.getElementById("importFile").files[0]

let reader=new FileReader()

reader.onload=function(e){

videos=JSON.parse(e.target.result)

saveVideos()

showVideos()

}

reader.readAsText(file)

}

/* DARK MODE */

function toggleDark(){

document.body.classList.toggle("dark")

}

showVideos()

</script>

</body>

</html>
