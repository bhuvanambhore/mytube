<!DOCTYPE html>
<html>

<head>

<title>MyTube AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f9f9f9;
}

header{
background:#ff0000;
color:white;
padding:15px;
font-size:24px;
}

.container{
padding:20px;
}

input,select{
padding:10px;
margin:5px;
}

button{
padding:10px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:25px;
margin-top:20px;
}

.video{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.thumbnail{
position:relative;
cursor:pointer;
height:170px;
}

.thumbnail img{
width:100%;
height:100%;
object-fit:cover;
}

.duration{
position:absolute;
bottom:8px;
right:8px;
background:black;
color:white;
font-size:12px;
padding:3px 6px;
border-radius:3px;
}

iframe{
width:100%;
height:170px;
border:none;
}

.info{
padding:10px;
}

.title{
font-weight:bold;
font-size:14px;
margin-bottom:5px;
}

.category{
font-size:12px;
color:gray;
margin-bottom:6px;
}

</style>

</head>

<body>

<header>
MyTube AI
</header>

<div class="container">

<input id="videoTitle" placeholder="Video topic">

<input id="videoLink" placeholder="Paste YouTube link">

<button onclick="addVideo()">Add Video</button>

<br><br>

<input id="search" placeholder="Search videos" onkeyup="searchVideo()">

<div class="grid" id="videoGrid"></div>

</div>

<script>

let videos = JSON.parse(localStorage.getItem("videos")) || []

function getID(url){

let reg=/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/

let match=url.match(reg)

return match?match[1]:null

}

function detectCategory(title){

title=title.toLowerCase()

if(title.includes("yoga") || title.includes("gym")) return "Gym/Yoga"

if(title.includes("food") || title.includes("recipe")) return "Health Food"

if(title.includes("stock") || title.includes("trade")) return "Trade"

if(title.includes("html") || title.includes("javascript")) return "Coding"

if(title.includes("health")) return "Full Body Care"

return "Education"

}

function addVideo(){

let title=document.getElementById("videoTitle").value
let url=document.getElementById("videoLink").value

let id=getID(url)

if(!id){
alert("Invalid YouTube link")
return
}

let category=detectCategory(title)

videos.push({
title:title,
id:id,
category:category
})

localStorage.setItem("videos",JSON.stringify(videos))

document.getElementById("videoTitle").value=""
document.getElementById("videoLink").value=""

showVideos()

}

function showVideos(){

let grid=document.getElementById("videoGrid")

grid.innerHTML=""

videos.forEach((v,index)=>{

let thumb="https://img.youtube.com/vi/"+v.id+"/hqdefault.jpg"

grid.innerHTML+=`

<div class="video">

<div class="thumbnail" onclick="playVideo(${index})" id="player${index}">

<img src="${thumb}">

<div class="duration">YouTube</div>

</div>

<div class="info">

<div class="title">${v.title}</div>

<div class="category">AI Category: ${v.category}</div>

<button onclick="deleteVideo(${index})">
Delete
</button>

</div>

</div>

`

})

}

function playVideo(index){

let id=videos[index].id

let container=document.getElementById("player"+index)

container.innerHTML=`

<iframe
src="https://www.youtube.com/embed/${id}?autoplay=1"
allow="autoplay; fullscreen"
allowfullscreen>
</iframe>

`

}

function deleteVideo(index){

videos.splice(index,1)

localStorage.setItem("videos",JSON.stringify(videos))

showVideos()

}

function searchVideo(){

let text=document.getElementById("search").value.toLowerCase()

let items=document.querySelectorAll(".video")

items.forEach(item=>{

let title=item.innerText.toLowerCase()

item.style.display=title.includes(text)?"block":"none"

})

}

showVideos()

</script>

</body>

</html>
