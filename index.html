<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MyTube</title>

<style>
body{font-family:Arial;text-align:center;background:#f2f2f2}
input{padding:10px;width:300px}
button{padding:10px;background:red;color:white;border:none}
#videos{display:grid;grid-template-columns:repeat(auto-fill,250px);gap:20px;justify-content:center;margin-top:30px}
.video img{width:250px;cursor:pointer}
iframe{width:500px;height:280px}
</style>

</head>

<body>

<h2>🎬 MyTube</h2>

<input id="videoLink" placeholder="Paste YouTube link">
<button onclick="addVideo()">Add</button>

<div id="player"></div>
<div id="videos"></div>

<script type="module" src="script.js"></script>

</body>
</html>
