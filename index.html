<!DOCTYPE html>
<html>

<head>

<title>MyTube V5</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#ff0000;
color:white;
padding:15px;
font-size:24px;
}

.container{
padding:20px;
}

input,select,textarea{
padding:10px;
margin:5px;
}

textarea{
width:520px;
height:90px;
}

button{
padding:8px 12px;
margin:4px;
cursor:pointer;
border:none;
background:#eee;
border-radius:4px;
}

button:hover{
background:#ddd;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
margin-top:20px;
}

.video{
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.thumbnail{
cursor:pointer;
height:160px;
}

.thumbnail img{
width:100%;
height:100%;
object-fit:cover;
}

iframe{
width:100%;
height:160px;
border:none;
}

.info{
padding:10px;
}

.title{
font-weight:bold;
margin-bottom:4px;
}

.category{
font-size:12px;
color:gray;
margin-bottom:6px;
}

.preview{
margin-top:10px;
}

.section{
margin-top:40px;
}

</style>

</head>

<body>

<header>
MyTube V5
</header>

<div class="container">

<h3>Add Video</h3>

<input id="videoLink" placeholder="Paste YouTube link" oninput="previewVideo()">

<input id="videoTitle" placeholder="Video title">

<select id="videoCategory">

<option value="Finance">Finance</option>
<option value="Coding">Coding</option>
<option value="Education">Education</option>
<option value="Health Food">Health Food</option>
<option value="GK">GK</option>
<option value="Full Body Care">Full Body Care</option>
<option value="Gym/Yoga">Gym/Yoga</option>
<option value="Trade">Trade</option>

</select>

<button onclick="addVideo()">Add Video</button>

<div id="preview" class="preview"></div>

<hr>

<input id="search" placeholder="Search videos" onkeyup="searchVideo()">

<div>

<button onclick="filterCategory('All')">All</button>
<button onclick="filterCategory('Finance')">Finance</button>
<button onclick="filterCategory('Coding')">Coding</button>
<button onclick="filterCategory('Education')">Education</button>
<button onclick="filterCategory('Health Food')">Health Food</button>
<button onclick="filterCategory('GK')">GK</button>
<button onclick="filterCategory('Full Body Care')">Full Body Care</button>
<button onclick="filterCategory('Gym/Yoga')">Gym/Yoga</button>
<button onclick="filterCategory('Trade')">Trade</button>

</div>

<div class="grid" id="videoGrid"></div>

<div class="section">

<h3>Bulk Import YouTube Links</h3>

<textarea id="bulkLinks" placeholder="Paste many YouTube links"></textarea>

<br>

<button onclick="bulkImport()">Import Videos</button>

</div>

<div class="section">

<h3>Library Tools</h3>

<button onclick="exportLibrary()">Export Backup</button>

<input type="file" id="importFile" onchange="importLibrary()">

</div>

</div>

<script>

let videos = JSON.parse(localStorage.getItem("videos")) || []
let currentCategory="All"

function saveVideos(){
localStorage.setItem("videos",JSON.stringify(videos))
}

function getID(url){

let reg=/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/
let match=url.match(reg)

return match?match[1]:null

}

function previewVideo(){

let url=document.getElementById("videoLink").value
let id=getID(url)

if(!id) return

let thumb="https://img.youtube.com/vi/"+id+"/hqdefault.jpg"

document.getElementById("preview").innerHTML=`
<img src="${thumb}" width="260">
`

}

function addVideo(){

let title=document.getElementById("videoTitle").value
let url=document.getElementById("videoLink").value
let category=document.getElementById("videoCategory").value

let id=getID(url)

if(!id){
alert("Invalid link")
return
}

videos.push({
title:title,
id:id,
category:category,
pinned:false
})

saveVideos()
showVideos()

}

function showVideos(){

let grid=document.getElementById("videoGrid")

grid.innerHTML=""

videos.forEach((v,index)=>{

if(currentCategory!="All" && v.category!=currentCategory) return

let thumb="https://img.youtube.com/vi/"+v.id+"/hqdefault.jpg"

grid.innerHTML+=`

<div class="video" draggable="true" ondragstart="dragStart(${index})">

<div class="thumbnail" onclick="playVideo(${index})" id="player${index}">
<img src="${thumb}">
</div>

<div class="info">

<div class="title">${v.title}</div>
<div class="category">${v.category}</div>

<button onclick="pinVideo(${index})">Pin</button>
<button onclick="editVideo(${index})">Edit</button>
<button onclick="deleteVideo(${index})">Delete</button>

</div>

</div>

`

})

}

function playVideo(index){

let id=videos[index].id

document.getElementById("player"+index).innerHTML=`

<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allowfullscreen></iframe>

`

}

function deleteVideo(index){

videos.splice(index,1)

saveVideos()
showVideos()

}

function editVideo(index){

let t=prompt("Edit title",videos[index].title)
let c=prompt("Edit category",videos[index].category)

videos[index].title=t
videos[index].category=c

saveVideos()
showVideos()

}

function pinVideo(index){

let video=videos.splice(index,1)[0]

videos.unshift(video)

saveVideos()
showVideos()

}

function searchVideo(){

let text=document.getElementById("search").value.toLowerCase()

document.querySelectorAll(".video").forEach(v=>{

v.style.display=v.innerText.toLowerCase().includes(text)?"block":"none"

})

}

function filterCategory(cat){

currentCategory=cat

showVideos()

}

function bulkImport(){

let lines=document.getElementById("bulkLinks").value.split("\n")

lines.forEach(link=>{

let id=getID(link)

if(id){

videos.push({
title:"Imported Video",
id:id,
category:"Education"
})

}

})

saveVideos()
showVideos()

}

function exportLibrary(){

let blob=new Blob([JSON.stringify(videos)],{type:"application/json"})

let url=URL.createObjectURL(blob)

let a=document.createElement("a")

a.href=url
a.download="mytube_backup.json"

a.click()

}

function importLibrary(){

let file=document.getElementById("importFile").files[0]

let reader=new FileReader()

reader.onload=function(e){

videos=JSON.parse(e.target.result)

saveVideos()
showVideos()

}

reader.readAsText(file)

}

showVideos()

</script>

</body>

</html>
