<!DOCTYPE html>
<html>

<head>

<title>MyTube</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f1f1f1;
}

header{
background:#ff0000;
color:white;
padding:15px;
font-size:24px;
}

.container{
padding:20px;
}

input{
padding:10px;
margin:5px;
}

button{
padding:10px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
margin-top:20px;
}

.video{
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.player{
width:100%;
height:170px;
border-radius:6px;
overflow:hidden;
cursor:pointer;
}

.player img{
width:100%;
height:100%;
object-fit:cover;
}

iframe{
width:100%;
height:100%;
border:none;
}

.title{
font-weight:bold;
margin-bottom:6px;
}

</style>

</head>

<body>

<header>
MyTube
</header>

<div class="container">

<input id="videoTitle" placeholder="Video topic">

<input id="videoLink" placeholder="Paste YouTube link">

<button onclick="addVideo()">Add Video</button>

<br><br>

<input id="search" placeholder="Search videos" onkeyup="searchVideo()">

<div class="grid" id="videoGrid"></div>

</div>

<script>

let videos = JSON.parse(localStorage.getItem("videos")) || []

function getID(url){

let reg = /(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/

let match = url.match(reg)

return match ? match[1] : null

}

function addVideo(){

let title = document.getElementById("videoTitle").value
let url = document.getElementById("videoLink").value

let id = getID(url)

if(!id){
alert("Invalid YouTube link")
return
}

videos.push({
title:title,
id:id
})

localStorage.setItem("videos",JSON.stringify(videos))

document.getElementById("videoTitle").value=""
document.getElementById("videoLink").value=""

showVideos()

}

function showVideos(){

let grid = document.getElementById("videoGrid")

grid.innerHTML=""

videos.forEach((v,index)=>{

let thumb = "https://img.youtube.com/vi/"+v.id+"/0.jpg"

grid.innerHTML += `

<div class="video">

<div class="title">${v.title}</div>

<div class="player" onclick="playVideo(${index})" id="player${index}">

<img src="${thumb}">

</div>

<br>

<button onclick="deleteVideo(${index})">Delete</button>

</div>

`

})

}

function playVideo(index){

let id = videos[index].id

let container = document.getElementById("player"+index)

container.innerHTML = `

<iframe
src="https://www.youtube.com/embed/${id}?autoplay=1"
allow="autoplay; fullscreen"
allowfullscreen>
</iframe>

`

}

function deleteVideo(index){

videos.splice(index,1)

localStorage.setItem("videos",JSON.stringify(videos))

showVideos()

}

function searchVideo(){

let text = document.getElementById("search").value.toLowerCase()

let items = document.querySelectorAll(".video")

items.forEach(item=>{

let title = item.innerText.toLowerCase()

item.style.display = title.includes(text) ? "block":"none"

})

}

showVideos()

</script>

</body>

</html>
